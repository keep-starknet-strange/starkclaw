name: session-signature-v2-conformance

on:
  pull_request:
    paths:
      - "spec/session-signature-v2.json"
      - "spec/session-signature-v2.schema.json"
      - ".github/workflows/session-signature-v2-conformance.yml"
  push:
    branches:
      - main
    paths:
      - "spec/session-signature-v2.json"
      - "spec/session-signature-v2.schema.json"
      - ".github/workflows/session-signature-v2-conformance.yml"
  workflow_dispatch:
  schedule:
    - cron: "50 4 * * *"

permissions:
  contents: read

concurrency:
  group: session-signature-v2-conformance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name || github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install AJV CLI
        run: npm install --global ajv-cli@5.0.0

      - name: Validate vector file against schema
        run: |
          ajv validate \
            --spec=draft2020 \
            --strict=true \
            -s spec/session-signature-v2.schema.json \
            -d spec/session-signature-v2.json

      - name: Validate vector invariants
        run: |
          node <<'EOF_JS'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("spec/session-signature-v2.json", "utf8"));

          const outsideIds = new Set();
          for (const vector of data.vectors) {
            if (outsideIds.has(vector.id)) {
              throw new Error(`Duplicate outside vector id: ${vector.id}`);
            }
            outsideIds.add(vector.id);
            if (vector.mode !== "v2_snip12") {
              throw new Error(`Unexpected outside mode for ${vector.id}: ${vector.mode}`);
            }
          }

          const sessionIds = new Set();
          let hasV1 = false;
          let hasV2 = false;
          let hasValid = false;
          let hasInvalid = false;
          for (const vector of data.sessionVectors) {
            if (sessionIds.has(vector.id)) {
              throw new Error(`Duplicate session vector id: ${vector.id}`);
            }
            sessionIds.add(vector.id);
            hasV1 = hasV1 || vector.mode === "v1_legacy";
            hasV2 = hasV2 || vector.mode === "v2_snip12";
            hasValid = hasValid || vector.status === "valid";
            hasInvalid = hasInvalid || vector.status === "invalid";
          }

          if (!hasV1 || !hasV2) {
            throw new Error("sessionVectors must contain both v1_legacy and v2_snip12");
          }
          if (!hasValid || !hasInvalid) {
            throw new Error("sessionVectors must contain valid and invalid vectors");
          }

          for (const vector of data.vectors) {
            if (vector.domain.name !== "Account.execute_from_outside") {
              throw new Error(`Unexpected outside domain.name for ${vector.id}: ${vector.domain.name}`);
            }
            if (!Array.isArray(vector.message.calls) || vector.message.calls.length === 0) {
              throw new Error(`Outside vector ${vector.id} has no calls`);
            }
          }

          console.log(
            `Validated ${data.vectors.length} outside vectors and ${data.sessionVectors.length} session vectors`,
          );
          EOF_JS

  parity_with_agentic:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Compare vectors with starknet-agentic main
        run: |
          if ! curl -fsSL \
            https://raw.githubusercontent.com/keep-starknet-strange/starknet-agentic/main/spec/session-signature-v2.schema.json \
            -o /tmp/agentic-session-signature-v2.schema.json; then
            echo "::warning::starknet-agentic schema not published yet on main; parity check skipped."
            echo "starknet-agentic schema not published yet on main; skipping parity check."
            exit 0
          fi
          if ! curl -fsSL \
            https://raw.githubusercontent.com/keep-starknet-strange/starknet-agentic/main/spec/session-signature-v2.json \
            -o /tmp/agentic-session-signature-v2.json; then
            echo "::warning::starknet-agentic vector file not published yet on main; parity check skipped."
            echo "starknet-agentic vector file not published yet on main; skipping parity check."
            exit 0
          fi
          diff -u /tmp/agentic-session-signature-v2.schema.json spec/session-signature-v2.schema.json
          diff -u /tmp/agentic-session-signature-v2.json spec/session-signature-v2.json
